networks:
  mcad_net:
    name: mcad_net
services:
  emondrian:
    build:
      context: ./emondrian
    ports:
      - "8081:8080"
    networks:
      - mcad_net


  pivot4j:
    build:
      context: ./pivot4j
    container_name: pivot4j
    ports:
      - "8090:8080"
    depends_on:
      - emondrian
      - mcad-api 
    networks:
      - mcad_net


  mcad-api:
    # Build from repo root so we can install backend/requirements.txt
    build:
      context: ..
      dockerfile: bi-stack/mcad-api/Dockerfile
    ports:
      - "8000:8000"
    # Mount the REAL backend (repo root /backend) inside the container
    volumes:
      - ../backend:/app/backend:ro
      - ./mcad-api-data:/app/data
    environment:
      MCAD_THRESHOLD_DEFAULT: "0.60"
      MCAD_OBJECTIVE_ID_DEFAULT: "O_REAL_BEER_WA_MONTH"
      # Make backend modules importable (mcad.*, ckg.*)
      PYTHONPATH: /app/backend:/app
      # Objectives YAML locations
      MCAD_OBJECTIVES_YAML: /app/backend/objectives.yaml
      MCAD_OBJECTIVES_FALLBACK_YAML: /app/backend/config/objectives.yaml
      MCAD_DATAWAREHOUSES_YAML: /app/backend/config/datawarehouses.yaml
      # Optional Neo4j CKG (uncomment if you run Neo4j)
      # NEO4J_URI: bolt://neo4j:7687
      # NEO4J_USER: neo4j
      # NEO4J_PASSWORD: password
    networks:
      - mcad_net

  mcad-proxy:
    build: ./mcad-proxy
    depends_on:
      - emondrian
      - mcad-api
    ports:
      - "9000:9000"
    environment: 
      UPSTREAM_XMLA: http://emondrian:8080/emondrian/xmla
      EMONDRIAN_XMLA_URL: http://emondrian:8080/emondrian/xmla
      PIVOT4J_URL: http://pivot4j:8080/pivot4j
      PIVOT4J_UPSTREAM: http://pivot4j:8080/pivot4j
      MCAD_API_BASE: http://mcad-api:8000
      MCAD_EVAL_URL: http://mcad-api:8000/eval
      MCAD_CKG_URL: http://mcad-api:8000/ckg/update
      PIVOT4J_PUBLIC_PREFIX: /pivot4j
      MCAD_OBJECTIVE_ID_DEFAULT: "O_REAL_BEER_WA_MONTH"
    command: ["uvicorn","app:app","--host","0.0.0.0","--port","9000","--log-level","info","--access-log"]
    networks:
      - mcad_net
