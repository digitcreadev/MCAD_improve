# backend/harness/scenarios.yaml
#
# Scenario campaign aligned with the MCAD article objective OHF_NORD.
# Each step carries a small oracle used for offline benchmarking:
#   - oracle_allow: whether the step should be considered contributive/useful
#   - oracle_ceval: constraints that become calculable if the step is executed
#
# The oracle is intentionally lightweight and mirrors the article examples:
#   c1 = margin Health Food / North / 1998
#   c2 = stockout Health Food / North / 1998
#   c3 = sales growth Health Food / North / 1997-1998
#
schema_version: 3
objective_id: OHF_NORD
dw_id: FOODMART
scenarios:
  - id: happy_guided_article_short
    label: Happy – parcours guidé article (c1 → c2 → c3)
    type: happy
    steps:
      - name: Q1_margin_month
        description: Marge% Health Food / Nord / 1998 par mois.
        oracle_allow: true
        oracle_ceval: [c1]
        qp:
          query_spec:
            cube: Sales
            measures: [Margin%]
            aggregators: [AVG]
            units: [PERCENT]
            group_by: [Time.Month, Product.Category]
            slicers:
              Product.Category: Health Food
              Store.Region: North
              Time.Year: "1998"
            window_start: "1998-01-01"
            window_end: "1998-12-31"
      - name: Q2_stockout_store
        description: Taux de rupture Health Food / Nord / 1998 par magasin.
        oracle_allow: true
        oracle_ceval: [c2]
        qp:
          query_spec:
            cube: Sales
            measures: [StockoutRate]
            aggregators: [AVG]
            units: [PERCENT]
            group_by: [Store.Store, Product.Category]
            slicers:
              Product.Category: Health Food
              Store.Region: North
              Time.Year: "1998"
            window_start: "1998-01-01"
            window_end: "1998-12-31"
      - name: Q3_sales_growth
        description: Chiffre d'affaires Health Food / Nord / 1997-1998 par mois.
        oracle_allow: true
        oracle_ceval: [c3]
        qp:
          query_spec:
            cube: Sales
            measures: [Store Sales]
            aggregators: [SUM]
            units: [CURRENCY]
            group_by: [Time.Month, Product.Category]
            slicers:
              Product.Category: Health Food
              Store.Region: North
            time_members: ["1997", "1998"]
            window_start: "1997-01-01"
            window_end: "1998-12-31"

