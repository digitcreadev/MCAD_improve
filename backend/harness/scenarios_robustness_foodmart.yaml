            window_end: "1997-12-31"
      - name: RB_Q3_growth_1998_only
        description: Growth candidate with only one year available.
        oracle_allow: false
        oracle_ceval: []
        qp:
          query_spec:
            cube: Sales
            measures: [Store Sales]
            aggregators: [SUM]
            units: [CURRENCY]
            group_by: [Time.Month, Product.Category]
            slicers:
              Product.Category: Health Food
              Store.Region: North
              Time.Year: "1998"
            window_start: "1998-01-01"
            window_end: "1998-12-31"
      - name: RB_Q4_sales_quantity
        description: Good slice, but irrelevant measure.
        oracle_allow: false
        oracle_ceval: []
        qp:
          query_spec:
            cube: Sales
            measures: [Sales Quantity]
            aggregators: [SUM]
            units: [COUNT]
            group_by: [Time.Month, Product.Category]
            slicers:
              Product.Category: Health Food
              Store.Region: North
              Time.Year: "1998"
            window_start: "1998-01-01"
            window_end: "1998-12-31"
      - name: RB_Q5_valid_growth
        description: Canonical growth query over 1997-1998.
        oracle_allow: true
        oracle_ceval: [c3]
        qp:
          query_spec:
            cube: Sales
            measures: [Store Sales]
            aggregators: [SUM]
            units: [CURRENCY]
            group_by: [Time.Month, Product.Category]
            slicers:
              Product.Category: Health Food
              Store.Region: North
            time_members: ["1997", "1998"]
            window_start: "1997-01-01"
            window_end: "1998-12-31"

