# Robustness campaign for FoodMart / OHF_NORD
schema_version: 4
objective_id: OHF_NORD
dw_id: FOODMART
scenarios:
  - id: rb_fm_clause_diagnostics
    label: Robustness – clause diagnostics and recovery (FoodMart)
    type: adversarial_sat
    steps:
      - name: RB_Q1_no_measure
        description: Invalid query with no measure.
        oracle_allow: false
        oracle_ceval: []
        qp:
          query_spec:
            cube: Sales
            group_by: [Time.Month, Product.Category]
            slicers:
              Product.Category: Health Food
              Store.Region: North
              Time.Year: "1998"
      - name: RB_Q2_conflicting_region_alias
        description: Contradictory region slicers using two aliases of the same logical dimension.
        oracle_allow: false
        oracle_ceval: []
        qp:
          query_spec:
            cube: Sales
            measures: [Margin%]
            aggregators: [AVG]
            units: [PERCENT]
            group_by: [Time.Month, Product.Category]
            slicers:
              Product.Category: Health Food
              Store.Region: North
              region: South
              Time.Year: "1998"
            window_start: "1998-01-01"
            window_end: "1998-12-31"
      - name: RB_Q3_reversed_window
        description: Same target, but with a reversed time window.
        oracle_allow: false
        oracle_ceval: []
        qp:
          query_spec:
            cube: Sales
            measures: [Margin%]
            aggregators: [AVG]
            units: [PERCENT]
            group_by: [Time.Month, Product.Category]
            slicers:
              Product.Category: Health Food
              Store.Region: North
              Time.Year: "1998"
            window_start: "1998-12-31"
            window_end: "1998-01-01"
      - name: RB_Q4_wrong_unit
        description: Margin query with a currency unit instead of percent.
        oracle_allow: false
        oracle_ceval: []
        qp:
          query_spec:
            cube: Sales
            measures: [Margin%]
            aggregators: [AVG]
            units: [CURRENCY]
            group_by: [Time.Month, Product.Category]
            slicers:
              Product.Category: Health Food
              Store.Region: North
              Time.Year: "1998"
            window_start: "1998-01-01"
            window_end: "1998-12-31"
      - name: RB_Q5_wrong_agg
        description: Margin query with SUM instead of AVG.
        oracle_allow: false
        oracle_ceval: []
        qp:
          query_spec:
            cube: Sales
            measures: [Margin%]
            aggregators: [SUM]
            units: [PERCENT]
            group_by: [Time.Month, Product.Category]
            slicers:
              Product.Category: Health Food
              Store.Region: North
              Time.Year: "1998"
            window_start: "1998-01-01"
            window_end: "1998-12-31"
      - name: RB_Q6_valid_margin
        description: Canonical useful query restoring the correct margin view.
        oracle_allow: true
        oracle_ceval: [c1]
        qp:
          query_spec:
            cube: Sales
            measures: [Margin%]
            aggregators: [AVG]
            units: [PERCENT]
            group_by: [Time.Month, Product.Category]
            slicers:
              Product.Category: Health Food
              Store.Region: North
              Time.Year: "1998"
            window_start: "1998-01-01"
            window_end: "1998-12-31"

