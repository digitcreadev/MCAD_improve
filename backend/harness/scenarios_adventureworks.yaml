            group_by: [Date.Month, Product.Category]
            slicers:
              Product.Category: Bikes
              SalesTerritory.Region: Europe
            time_members: ["2012", "2013"]
            window_start: "2012-01-01"
            window_end: "2013-12-31"
      - name: AW_Q2_margin_month
        description: Gross Margin% Bikes / Europe / 2013 par mois.
        oracle_allow: true
        oracle_ceval: [aw_c1]
        qp:
          query_spec:
            cube: Adventure Works Sales
            measures: [Gross Margin%]
            aggregators: [AVG]
            units: [PERCENT]
            group_by: [Date.Month, Product.Category]
            slicers:
              Product.Category: Bikes
              SalesTerritory.Region: Europe
              Date.Year: "2013"
            window_start: "2013-01-01"
            window_end: "2013-12-31"
      - name: AW_Q3_return_reseller
        description: ReturnRate Bikes / Europe / 2013 par revendeur.
        oracle_allow: true
