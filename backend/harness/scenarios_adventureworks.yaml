# backend/harness/scenarios_adventureworks.yaml
#
# Second dataset campaign for AdventureWorks-like schema.
# Objective: OAW_BIKES_EUROPE
#   aw_c1 = gross margin Bikes / Europe / 2013
#   aw_c2 = return rate Bikes / Europe / 2013
#   aw_c3 = sales growth Bikes / Europe / 2012-2013
schema_version: 3
objective_id: OAW_BIKES_EUROPE
dw_id: ADVENTUREWORKS
scenarios:
  - id: aw_happy_guided_article_short
    label: Happy – parcours guidé AdventureWorks (aw_c1 → aw_c2 → aw_c3)
    type: happy
    steps:
      - name: AW_Q1_margin_month
        description: Gross Margin% Bikes / Europe / 2013 par mois.
        oracle_allow: true
        oracle_ceval: [aw_c1]
        qp:
          query_spec:
            cube: Adventure Works Sales
            measures: [Gross Margin%]
            aggregators: [AVG]
            units: [PERCENT]
            group_by: [Date.Month, Product.Category]
            slicers:
              Product.Category: Bikes
              SalesTerritory.Region: Europe
              Date.Year: "2013"
            window_start: "2013-01-01"
            window_end: "2013-12-31"
      - name: AW_Q2_return_reseller
        description: ReturnRate Bikes / Europe / 2013 par revendeur.
        oracle_allow: true
        oracle_ceval: [aw_c2]
        qp:
          query_spec:
            cube: Adventure Works Sales
            measures: [ReturnRate]
            aggregators: [AVG]
            units: [PERCENT]
            group_by: [Reseller.Reseller, Product.Category]
            slicers:
              Product.Category: Bikes
              SalesTerritory.Region: Europe
              Date.Year: "2013"
            window_start: "2013-01-01"
            window_end: "2013-12-31"
      - name: AW_Q3_sales_growth
        description: Sales Amount Bikes / Europe / 2012-2013 par mois.
        oracle_allow: true
        oracle_ceval: [aw_c3]
        qp:
          query_spec:
            cube: Adventure Works Sales
            measures: [Sales Amount]
            aggregators: [SUM]
            units: [CURRENCY]
            group_by: [Date.Month, Product.Category]
            slicers:
              Product.Category: Bikes
              SalesTerritory.Region: Europe
            time_members: ["2012", "2013"]
            window_start: "2012-01-01"
            window_end: "2013-12-31"

  - id: aw_happy_guided_reordered
    label: Happy – même objectif AdventureWorks mais ordre différent
    type: happy
    steps:
      - name: AW_Q1_sales_growth
        description: Croissance des ventes avant marge et retours.
        oracle_allow: true
