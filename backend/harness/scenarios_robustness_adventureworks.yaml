# Robustness campaign for AdventureWorks / OAW_BIKES_EUROPE
schema_version: 4
objective_id: OAW_BIKES_EUROPE
dw_id: ADVENTUREWORKS
scenarios:
  - id: rb_aw_clause_diagnostics
    label: Robustness – clause diagnostics and recovery (AdventureWorks)
    type: adversarial_sat
    steps:
      - name: RB_AW_Q1_no_measure
        description: Invalid query with no measure.
        oracle_allow: false
        oracle_ceval: []
        qp:
          query_spec:
            cube: Adventure Works Sales
            group_by: [Date.Month, Product.Category]
            slicers:
              Product.Category: Bikes
              SalesTerritory.Region: Europe
              Date.Year: "2013"
      - name: RB_AW_Q2_conflicting_region_alias
        description: Contradictory region aliases over the same logical dimension.
        oracle_allow: false
        oracle_ceval: []
        qp:
          query_spec:
            cube: Adventure Works Sales
            measures: [Gross Margin%]
            aggregators: [AVG]
            units: [PERCENT]
            group_by: [Date.Month, Product.Category]
            slicers:
              Product.Category: Bikes
              SalesTerritory.Region: Europe
              region: Pacific
              Date.Year: "2013"
            window_start: "2013-01-01"
            window_end: "2013-12-31"
      - name: RB_AW_Q3_reversed_window
        description: Same target, but reversed time bounds.
        oracle_allow: false
        oracle_ceval: []
        qp:
          query_spec:
            cube: Adventure Works Sales
            measures: [Gross Margin%]
            aggregators: [AVG]
            units: [PERCENT]
            group_by: [Date.Month, Product.Category]
            slicers:
              Product.Category: Bikes
              SalesTerritory.Region: Europe
              Date.Year: "2013"
            window_start: "2013-12-31"
            window_end: "2013-01-01"
      - name: RB_AW_Q4_wrong_unit
        description: Gross margin query with a currency unit instead of percent.
        oracle_allow: false
        oracle_ceval: []
        qp:
          query_spec:
            cube: Adventure Works Sales
            measures: [Gross Margin%]
            aggregators: [AVG]
            units: [CURRENCY]
            group_by: [Date.Month, Product.Category]
            slicers:
              Product.Category: Bikes
              SalesTerritory.Region: Europe
              Date.Year: "2013"
            window_start: "2013-01-01"
            window_end: "2013-12-31"
      - name: RB_AW_Q5_wrong_agg
        description: Gross margin query with SUM instead of AVG.
        oracle_allow: false
        oracle_ceval: []
        qp:
          query_spec:
            cube: Adventure Works Sales
            measures: [Gross Margin%]
            aggregators: [SUM]
            units: [PERCENT]
            group_by: [Date.Month, Product.Category]
            slicers:
              Product.Category: Bikes
              SalesTerritory.Region: Europe
              Date.Year: "2013"
            window_start: "2013-01-01"
            window_end: "2013-12-31"
      - name: RB_AW_Q6_valid_margin
        description: Canonical useful gross margin query.
        oracle_allow: true
        oracle_ceval: [aw_c1]
        qp:
          query_spec:
            cube: Adventure Works Sales
            measures: [Gross Margin%]
            aggregators: [AVG]
            units: [PERCENT]
            group_by: [Date.Month, Product.Category]
            slicers:
              Product.Category: Bikes
              SalesTerritory.Region: Europe
              Date.Year: "2013"
            window_start: "2013-01-01"
            window_end: "2013-12-31"

